# Derived from Coolify generateDefaultProxyConfiguration CADDY branch,
# bootstrap/helpers/proxy.php:360-393 (image lucaslorentz/caddy-docker-proxy:
# 2.8-alpine :366, env :371-374, ports 80/443/443udp :376-380 with NO 8080
# dashboard port, labels :381-384, docker.sock ro + dynamic/config/data volumes
# :385-390). Adapted to Rustify naming per Contract C7: container rustify-proxy,
# dir /data/rustify/proxy, network rustify, labels rustify.managed / rustify.proxy.
name: rustify-proxy
networks:
  rustify:
    external: true
services:
  caddy:
    container_name: rustify-proxy
    image: lucaslorentz/caddy-docker-proxy:2.8-alpine
    restart: unless-stopped
    extra_hosts:
    - host.docker.internal:host-gateway
    environment:
    - CADDY_DOCKER_POLLING_INTERVAL=5s
    - CADDY_DOCKER_CADDYFILE_PATH=/dynamic/Caddyfile
    networks:
    - rustify
    ports:
    - 80:80
    - 443:443
    - 443:443/udp
    labels:
    - rustify.managed=true
    - rustify.proxy=true
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock:ro
    - /data/rustify/proxy/dynamic:/dynamic
    - /data/rustify/proxy/config:/config
    - /data/rustify/proxy/data:/data

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: rustify
      POSTGRES_PASSWORD: rustify
      POSTGRES_DB: rustify
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustify"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:

# E2E stack: a Postgres for rustify-server and a privileged docker-in-docker
# "testhost" that stands in for a real deployment target reachable over SSH.
#
# SSH_PUBKEY must be exported before `docker compose build` (the Makefile does
# this from tests/e2e/docker/fixtures/id_ed25519.pub).
name: rustify-e2e

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: rustify
      POSTGRES_PASSWORD: rustify
      POSTGRES_DB: rustify
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rustify"]
      interval: 3s
      timeout: 3s
      retries: 20

  testhost:
    build:
      context: .
      dockerfile: docker/testhost.Dockerfile
      args:
        SSH_PUBKEY: ${SSH_PUBKEY:?export SSH_PUBKEY from docker/fixtures/id_ed25519.pub}
    privileged: true
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD-SHELL", "docker info >/dev/null 2>&1"]
      interval: 3s
      timeout: 5s
      retries: 40
